plugins:
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  TargetRailsVersion: 7.1
  NewCops: enable
  Exclude:
    - gemfiles/**/*
    - lib/generators/**/templates/**/* # ERB, not valid Ruby
    - spec/dummy/**/*
    - vendor/**/*

# The engine can't assume the host app's ApplicationRecord exists.
Rails/ApplicationRecord:
  Exclude:
    - app/models/**/*
    - spec/ar/**/*

# Public API documentation is enforced via YARD review, not this cop.
Style/Documentation:
  Enabled: false

# validate! returning true is the Rails idiom (ActiveModel#validate!).
Naming/PredicateMethod:
  AllowedMethods:
    - validate!

RSpec/DescribeClass:
  Exclude:
    - spec/ar/**/*
    - spec/integrations/**/*
    - spec/forseti/consent_config_spec.rb
    - spec/forseti/zeitwerk_spec.rb
    - spec/forseti/scanner/checks_spec.rb
    - spec/forseti/scanner/checks_awareness_spec.rb
    - spec/forseti/tasks_spec.rb

RSpec/SpecFilePathFormat:
  Exclude:
    - spec/ar/**/*

Style/StringLiterals:
  EnforcedStyle: double_quotes

Metrics/BlockLength:
  Exclude:
    - spec/**/*
    - "*.gemspec"
    - Appraisals
    - lib/forseti/tasks.rb
    - lib/forseti/compliance/policies/**/* # declarations, not logic

Metrics/MethodLength:
  Max: 15
  Exclude:
    - spec/**/*

Metrics/AbcSize:
  Max: 22
  Exclude:
    - spec/**/*
    - lib/forseti/compliance/policies/**/* # declarations, not logic

# Keyword arguments are self-documenting; the count limit targets positional.
Metrics/ParameterLists:
  CountKeywordArgs: false

# Rake tasks are a CLI: stdout and exit codes are their interface.
Rails/Output:
  Exclude:
    - lib/forseti/tasks.rb

Rails/Exit:
  Exclude:
    - lib/forseti/tasks.rb

RSpec/ExampleLength:
  Max: 10

RSpec/MultipleExpectations:
  Max: 4
